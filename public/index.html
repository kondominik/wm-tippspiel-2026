<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WM 2026 Tippspiel</title><link rel="stylesheet" href="style.css"></head><body><header><h1>WM 2026 Tippspiel</h1><p>Exaktes Ergebnis nach 90 Minuten. Pot wird bei keinem Treffer übertragen.</p></header><main><section class="card"><h2>Teilnehmer Login</h2><select id="loginName"></select><input id="loginPin" placeholder="PIN" type="password"><button id="loginBtn">Einloggen</button><span id="loginMsg"></span></section><section id="app" hidden><div class="tabs"><button data-tab="tips">Tippen</button><button data-tab="rank">Rangliste</button><button data-tab="view">Tipps ansehen</button><button data-tab="special">Weltmeister/Torschützenkönig</button></div><div id="tips" class="tab"></div><div id="rank" class="tab" hidden></div><div id="view" class="tab" hidden></div><div id="special" class="tab" hidden><h2>Sondertipps</h2><input id="champion" placeholder="Weltmeister Mannschaft"><input id="topScorer" placeholder="Torschützenkönig Name"><button id="saveSpecial">Sondertipps speichern</button></div></section><section class="card"><h2>Admin</h2><input id="adminPass" type="password" placeholder="Admin-Passwort"><button id="adminBtn">Admin öffnen</button><div id="admin" hidden></div></section></main><script src="app.js"></script></body></html>
